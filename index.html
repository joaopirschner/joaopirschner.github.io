<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>João Pedro | Desenvolvedor</title>
  <meta name="description" content="Portfólio simples de João Pedro Pirschner de Oliveira — Desenvolvedor." />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />

  <style>
    :root{
      --bg: #0d0221;
      --card: rgba(255,255,255,0.06);
      --card-2: rgba(255,255,255,0.09);
      --text: rgba(255,255,255,0.92);
      --muted: rgba(255,255,255,0.70);
      /* Palette Purple */
      --purple-light: #d8b4fe;
      --purple-base: #a855f7;
      --purple-dark: #6b21a8;
      /* Palette Cyan (Neon) */
      --cyan-light: #b2faff;
      --cyan-base: #00f5ff;
      --cyan-dark: #008b94;
      
      --ring: rgba(168, 85, 247, 0.35);
      --border-pixel: #000000;
      --shadow: 6px 6px 0px rgba(0,0,0,0.5);
      --radius: 0px;
    }

    html{ scroll-behavior: smooth; }
    *{ box-sizing: border-box; }

    body{
      margin: 0;
      font-family: 'VT323', monospace;
      font-size: 1.2rem;
      background:
        radial-gradient(900px 500px at 15% 10%, rgba(168, 85, 247, 0.25), transparent 60%),
        radial-gradient(700px 450px at 85% 15%, rgba(236, 72, 153, 0.15), transparent 55%),
        linear-gradient(180deg, #070c17, var(--bg));
      color: var(--text);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden;
    }

    h1, h2, h3, h4, strong, b { font-weight: normal; }

    a{ color: inherit; text-decoration: none; }

    .container{
      width: min(980px, 100%);
      margin: 0 auto;
      padding: 24px;
    }

    .nav{
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0 20px;
      position: relative;
      z-index: 10;
    }

    .brand{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-size: 1.5rem;
      letter-spacing: 0.2px;
    }

    .brand-badge{
      width: 16px;
      height: 16px;
      border-radius: 0;
      background: var(--purple-base);
      box-shadow: 2px 2px 0px rgba(0,0,0,0.5);
    }

    /* BOTÃO DE CONTATO PRINCIPAL */
    .cta-top {
      font-family: 'VT323', monospace;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      border-radius: 0;
      border: 3px solid #fff;
      background: rgba(255,255,255,0.05);
      transition: transform 160ms ease, background 160ms ease, border-color 160ms ease;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--text);
      position: relative;
      overflow: hidden;
      z-index: 100;
    }

    /* Correção do posicionamento antigo para evitar erros de validação */
    .cta-top::before {
      content: '';
      position: absolute;
      top: -10px;
      left: -10px;
      right: -10px;
      bottom: -10px;
      background: radial-gradient(40px 40px at 30% 30%, rgba(168, 85, 247, 0.45), transparent 55%),
                  radial-gradient(45px 45px at 75% 70%, rgba(0, 245, 255, 0.18), transparent 60%);
      opacity: 0;
      transform: scale(0.5);
      transition: opacity 160ms ease, transform 260ms ease;
      pointer-events: none;
    }

    .cta-top:hover {
      transform: translate(2px, 2px);
      background: rgba(255,255,255,0.09);
      border-color: rgba(255,255,255,0.55);
    }

    .cta-top:hover::before {
      opacity: 1;
      transform: scale(1);
    }

    header.hero{
      padding: 18px 0 12px;
    }

    .hero-grid{
      display: grid;
      grid-template-columns: 1fr;
      gap: 28px;
      align-items: stretch;
      margin-top: 10px;
    }

    .profile-card{
      position: relative;
      overflow: hidden;
      border-radius: 0;
      background: var(--bg);
      border: 4px solid var(--border-pixel);
      box-shadow: 
        inset 4px 4px 0px var(--purple-light),
        inset -4px -4px 0px var(--purple-dark),
        var(--shadow);
      padding: 24px;
    }

    .profile-top{
      display: flex;
      align-items: center;
      gap: 24px;
      flex-direction: column;
      text-align: center;
    }

    .avatar{
      width: 80px;
      height: 80px;
      border-radius: 0;
      background:
        radial-gradient(40px 40px at 30% 30%, rgba(236, 72, 153, 0.6), transparent 65%),
        radial-gradient(45px 45px at 70% 70%, rgba(168, 85, 247, 0.6), transparent 70%),
        rgba(255,255,255,0.06);
      border: 4px solid var(--border-pixel);
      box-shadow: 
        inset 4px 4px 0px var(--purple-light),
        inset -4px -4px 0px var(--purple-dark);
      display: grid;
      place-items: center;
      font-size: 1.5rem;
      flex-shrink: 0;
    }

    .profile-info {
      flex: 1;
    }

    .headline{
      margin: 0;
      font-size: 2.2rem;
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .subheadline{
      margin: 6px 0 0;
      color: var(--muted);
      font-size: 1.4rem;
    }

    .role{
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      padding: 6px 12px;
      border-radius: 0;
      border: 2px solid rgba(255,255,255,0.2);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.88);
      font-size: 1.1rem;
    }

    .role-dot{
      width: 8px;
      height: 8px;
      background: var(--purple-base);
    }

    .hero-actions{
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 20px;
      justify-content: center;
    }

    .btn{
      font-family: 'VT323', monospace;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 0;
      border: 4px solid #fff;
      background: rgba(255,255,255,0.05);
      color: var(--text);
      font-size: 1.3rem;
      min-width: 160px;
      box-shadow: 4px 4px 0px rgba(0,0,0,0.5);
    }

    .btn.primary{
      background: var(--purple-base);
      border: 4px solid var(--border-pixel);
      box-shadow: 
        inset 4px 4px 0px var(--purple-light),
        inset -4px -4px 0px var(--purple-dark),
        4px 4px 0px rgba(0,0,0,0.5);
    }

    .grid-cards{
      display: grid;
      grid-template-columns: 1fr;
    }

    .card{
      border-radius: 0;
      border: 4px solid var(--border-pixel);
      background: var(--bg);
      padding: 20px;
      box-shadow: 
        inset 4px 4px 0px var(--purple-light),
        inset -4px -4px 0px var(--purple-dark),
        var(--shadow);
    }

    .card h2{
      margin: 0 0 14px;
      font-size: 1.5rem;
      color: rgba(255,255,255,0.80);
    }

    .tech-list{
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .chip{
      padding: 6px 12px;
      border-radius: 0;
      border: 2px solid #fff;
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.88);
      font-size: 1.1rem;
    }

    .projects-section {
      margin-top: 10px;
    }
    .project-card {
      background: var(--card);
      border: 4px solid var(--border-pixel);
      border-radius: 0;
      padding: 20px;
      margin-bottom: 16px;
      box-shadow: 
        inset 4px 4px 0px var(--purple-light),
        inset -4px -4px 0px var(--purple-dark),
        var(--shadow);
    }

    /* TRANSIÇÃO DO BALÃO INFLÁVEL */
    .pixel-balloon-overlay {
      position: fixed;
      top: 25px;
      right: 25px;
      width: 12px;
      height: 12px;
      background: var(--bg);
      border: 0px solid var(--border-pixel);
      z-index: 90;
      pointer-events: none;
      opacity: 0;
      transform: scale(0);
      transform-origin: center;
      transition: transform 850ms cubic-bezier(0.3, 1, 0.2, 1), opacity 300ms ease;
    }

    .pixel-balloon-overlay.is-inflated {
      opacity: 1;
      transform: scale(320); 
      border: 1px solid var(--purple-base);
      pointer-events: auto;
    }

    .contact-overlay-content {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 95;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      opacity: 0;
      pointer-events: none;
      transform: translateY(30px);
      transition: opacity 400ms ease 600ms, transform 500ms cubic-bezier(0.1, 0.8, 0.1, 1) 600ms;
    }

    .contact-overlay-content.is-visible {
      opacity: 1;
      pointer-events: auto;
      transform: translateY(0);
    }

    .contact-card-8bit {
      width: 100%;
      max-width: 530px;
      background: #11062b;
      border: 4px solid var(--border-pixel);
      padding: 35px 24px;
      box-shadow: 
        inset 4px 4px 0px var(--purple-light),
        inset -4px -4px 0px var(--purple-dark),
        var(--shadow);
      text-align: center;
    }

    .contact-header h2 {
      font-size: 2rem;
      color: var(--purple-light);
      margin: 0 0 6px 0;
      text-shadow: 2px 2px 0px rgba(0,0,0,0.5);
    }

    .contact-header p {
      color: var(--muted);
      font-size: 1.3rem;
      margin: 0 0 24px 0;
    }

    .social-grid-8bit {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    /* BOTÕES DE CONTATO INTERNOS */
    .social-8bit {
      font-family: 'VT323', monospace;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border: 3px solid #fff;
      background: rgba(255,255,255,0.05);}
